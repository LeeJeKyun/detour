version: 2

project_name: detour

before:
  hooks:
    - go mod tidy
    # go-winres 자체는 release.yml(또는 로컬 빌드 환경)에서 사전 설치한다.
    # GoReleaser hook은 child shell에서 실행되므로 $GITHUB_PATH 가 항상
    # 상속된다고 가정하지 않고 GOPATH/bin 절대 경로로 호출한다.
    - sh -c '"$(go env GOPATH)/bin/go-winres" make --arch amd64'

builds:
  - id: detour
    main: .
    binary: detour
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: detour
    formats: [zip]
    name_template: "detour_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## detour {{ .Tag }}

    Single-file Windows binary. Run as Administrator.
  footer: |
    ---

    **Note**: detour embeds [WinDivert](https://github.com/basil00/WinDivert) (LGPLv3 / GPLv2). The upstream WinDivert license must be included alongside any redistribution.
